[toolchain]
anchor_version = "0.30.1"

[features]
resolution = true
skip-lint = false

[programs.localnet]
agent_registry = "AgentRegist1111111111111111111111111111111"
payment_router = "PaymentRoutr1111111111111111111111111111111"
split_vault = "SplitVau1t11111111111111111111111111111111"

[programs.testnet]
agent_registry = "AgentRegist1111111111111111111111111111111"
payment_router = "PaymentRoutr1111111111111111111111111111111"
split_vault = "SplitVau1t11111111111111111111111111111111"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "testnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "yarn run ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.ts"

[test.validator]
url = "https://api.testnet.solana.com"
